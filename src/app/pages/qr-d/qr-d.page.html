<ion-header>
  <ion-toolbar>
    <ion-title>QR</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding" fullscreen>
  <div class="qr-container">

    <qrcode [qrdata]="'https://example.com'" [errorCorrectionLevel]="'M'" [width]="200"></qrcode>
    
    <p class="timer">Tiempo Restante {{ minutes }}:{{ seconds | number: '2.0' }}</p>


    <ion-button expand="block" color="primary" (click)="cerrar()">Cerrar</ion-button>
  </div>
</ion-content>
