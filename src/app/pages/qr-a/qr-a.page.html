<ion-header>
  <ion-toolbar>
    <ion-title class="title">Escanear QR</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding qr-page">
  <div class="qr-container">
    <!-- Aquí va el código QR -->
    <qrcode [qrdata]="'https://example.com'" [errorCorrectionLevel]="'M'" [width]="200"></qrcode>
  </div>

  <div class="scan-button-container">
    <ion-button expand="block" color="primary"  (click)="asistencia()">Escanear</ion-button>
  </div>
</ion-content>
