<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Curso 1 Asistencia</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-list>
    <ion-item *ngFor="let estudiante of estudiantes">
      <ion-avatar slot="start">
        <ion-icon name="person"></ion-icon>
      </ion-avatar>
      <ion-label>{{ estudiante.nombre }}</ion-label>
      <ion-checkbox [(ngModel)]="estudiante.asistencia" slot="end"></ion-checkbox>
    </ion-item>
  </ion-list>

  <ion-button expand="block" (click)="enviar()">
    Enviar
  </ion-button>
</ion-content>
