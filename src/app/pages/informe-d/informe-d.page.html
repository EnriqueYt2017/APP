<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Lista de Reprobados</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>

  <!-- Sección de Lista del Curso -->
  <ion-card>
    <ion-card-header>
      <ion-card-title>Curso 1</ion-card-title>
    </ion-card-header>

    <ion-list>
      <!-- Uso de *ngFor para generar dinámicamente la lista de estudiantes -->
      <ion-item *ngFor="let estudiante of estudiantes; let i = index">
        <ion-label>
          <h2>{{ estudiante.nombre }}</h2>
          <p>Asistencia: {{ estudiante.asistencia }}</p>
        </ion-label>
        <!-- Botón para eliminar estudiante con el evento (click) -->
        <ion-icon slot="end" name="close-circle" color="danger" (click)="eliminarEstudiante(i)"></ion-icon>
      </ion-item>
    </ion-list>
  </ion-card>

  <!-- Botones para exportar en PDF y Excel -->
  <ion-grid>
    <ion-row class="ion-justify-content-around">
      <ion-col size="6">
        <ion-button expand="block" color="danger">
          <ion-icon slot="start" name="document"></ion-icon>
          PDF
        </ion-button>
      </ion-col>

      <ion-col size="6">
        <ion-button expand="block" color="success">
          <ion-icon slot="start" name="logo-microsoft"></ion-icon>
          Excel
        </ion-button>
      </ion-col>
    </ion-row>
  </ion-grid>

</ion-content>
