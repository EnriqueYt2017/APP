<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Cursos</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div class="lista-cursos">
    <ion-card *ngFor="let clase of clases">
      <ion-item button detail (click)="seleccionarClase(clase)">
        <ion-avatar slot="start">
          <ion-icon name="book-outline" style="font-size: 2rem;"></ion-icon>
        </ion-avatar>
        <ion-label>
          <h2>{{ clase.nombre }}</h2>
          <p>{{ clase.codigo }}</p>
        </ion-label>
      </ion-item>
    </ion-card>
  </div>
</ion-content>
